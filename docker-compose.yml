version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: fixity_db
    restart: always
    environment:
      POSTGRES_USER: fixity_user
      POSTGRES_PASSWORD: fixity_password
      POSTGRES_DB: fixity
    ports:
      - "5433:5432"
    volumes:
      - fixity_pgdata:/var/lib/postgresql/data

volumes:
  fixity_pgdata:
